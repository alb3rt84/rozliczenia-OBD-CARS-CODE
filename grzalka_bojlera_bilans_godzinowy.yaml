    lambda: |-
      if (std::isnan(id(energia_grzalki_kwh)) || std::isnan(id(energia_grzalki_nadwyzka_kwh)) ||
          id(energia_grzalki_kwh) <= 0.0f) return 0.0f;
      float sprawnosc = (id(energia_grzalki_nadwyzka_kwh) / id(energia_grzalki_kwh)) * 100.0f;
      if (std::isnan(sprawnosc)) sprawnosc = 0.0f;
      if (sprawnosc > 100.0f) sprawnosc = 100.0f;
      if (sprawnosc < 0.0f) sprawnosc = 0.0f;
      return sprawnosc;
