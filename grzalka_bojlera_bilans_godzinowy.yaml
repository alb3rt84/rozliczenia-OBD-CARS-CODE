esphome:
  name: grzaka-bojlera
  friendly_name: Grzałka bojlera
  on_boot:
    priority: -100
    then:
      - output.set_level:
          id: grzalka_pwm
          level: 0.0
      - output.set_level:
          id: led_pwm
          level: 0.0
      - number.set:
          id: grzalka_moc
          value: 0

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret grzalka_bojlera_api_key

ota:
  - platform: esphome
    password: !secret grzalka_bojlera_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Grzaka-Bojlera Fallback Hotspot"
    password: !secret grzalka_bojlera_ap_password

captive_portal:

time:
  - platform: homeassistant
    id: ha_time

# Glowna petla bilansowania godzinowego z licznikow (odczyty co 30 sekund)
interval:
  - interval: 30s
    then:
      - script.execute: regulacja_auto

# -- Wyjscia ---------------------------------------------------------------
output:
  - platform: slow_pwm
    pin: GPIO16
    id: grzalka_pwm
    period: 15s
  - platform: ledc
    pin: GPIO2
    id: led_pwm
    inverted: false

# -- Zmienne globalne ------------------------------------------------------
globals:
  - id: grid_power_wartosc
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: pv_power_wartosc
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: grid_power_ostatni_odczyt_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: pv_power_przy_grid_wartosc
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: grzalka_moc_przy_grid_w
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: grzalka_moc_ostatnia_zmiana_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: temp_cwu_wartosc
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: temp_cwu_ma_odczyt
    type: bool
    restore_value: no
    initial_value: 'false'

  # Bilans godzinowy: dodatni = nadwyzka oddana do sieci w aktualnej godzinie.
  - id: bilans_zainicjowany
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: godzina_bilansu
    type: int
    restore_value: no
    initial_value: '-1'
  - id: start_import_kwh_godzina
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: start_export_kwh_godzina
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: ostatni_import_kwh
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: ostatni_export_kwh
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: ostatni_odczyt_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: bilans_godzinowy_wh
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: srednia_moc_okna_w
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: moc_banku_godzinowego_w
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: grzalka_auto_start_w_godzinie
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: bufor_startu_grzalki_wh
    type: float
    restore_value: no
    initial_value: '30.0'
  - id: rezerwa_exportu_godzinowego_wh
    type: float
    restore_value: no
    initial_value: '10.0'
  - id: docelowy_export_w
    type: float
    restore_value: no
    initial_value: '200.0'

# -- Suwaki ----------------------------------------------------------------
number:
  - platform: template
    name: "Moc grzałki"
    id: grzalka_moc
    min_value: 0
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    optimistic: true
    mode: slider
    initial_value: 0
    restore_value: false
    on_value:
      - lambda: |-
          float t_max = id(temp_max_ustawienie).state;
          float t_wody = id(temp_cwu_ha).state;
          bool temp_ok = !std::isnan(t_wody);
          if (!temp_ok && id(temp_cwu_ma_odczyt)) {
            t_wody = id(temp_cwu_wartosc);
            temp_ok = !std::isnan(t_wody);
          }

          if (x > 0.0f && (!temp_ok || std::isnan(t_max) || t_wody >= t_max)) {
            if (!temp_ok || std::isnan(t_max)) {
              ESP_LOGE("TERMOSTAT", "Blokuje moc grzalki %.0f%%: brak poprawnej temperatury CWU albo nastawy.", x);
            } else {
              ESP_LOGE("TERMOSTAT", "Blokuje moc grzalki %.0f%%: woda %.1fC >= nastawa %.0fC. Wylaczam tryby pracy.", x, t_wody, t_max);
            }
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            id(grzalka_moc_ostatnia_zmiana_ms) = millis();
            return;
          }

          id(grzalka_moc_ostatnia_zmiana_ms) = millis();
          id(grzalka_pwm).set_level(x / 100.0f);
          id(led_pwm).set_level(x / 100.0f);

  - platform: template
    name: "Moc grzałki temperatura max"
    id: temp_max_ustawienie
    min_value: 40
    max_value: 70
    step: 1
    unit_of_measurement: "°C"
    optimistic: true
    mode: slider
    initial_value: 60
    restore_value: true
    on_value:
      - lambda: |-
          float t_wody = id(temp_cwu_ha).state;
          bool temp_ok = !std::isnan(t_wody);
          if (!temp_ok && id(temp_cwu_ma_odczyt)) {
            t_wody = id(temp_cwu_wartosc);
            temp_ok = !std::isnan(t_wody);
          }

          if (!temp_ok) {
            ESP_LOGE("SUWAK", "Brak poprawnego odczytu temperatury CWU po zmianie nastawy na %.0fC. Wylaczam grzalke i tryby pracy.", x);
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }

          id(temp_cwu_wartosc) = t_wody;
          if (t_wody >= x) {
            ESP_LOGE("SUWAK", "Nastawa %.0fC <= woda %.1fC. Wylaczam grzalke i tryby pracy.", x, t_wody);
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else {
            ESP_LOGD("SUWAK", "Nastawa %.0fC > woda %.1fC. Nie zmieniam trybu pracy.", x, t_wody);
          }

# -- Sensory ---------------------------------------------------------------
sensor:
  - platform: homeassistant
    id: grid_power_ha
    entity_id: sensor.energy_grid_licznik_energii_wm_bus_gateway_moc_poboru_licznik_energii_wm_bus_gateway_moc_oddawana_net_power
    on_value:
      - lambda: |-
          id(grid_power_wartosc) = x;
          id(grid_power_ostatni_odczyt_ms) = millis();
          id(pv_power_przy_grid_wartosc) = id(pv_power_wartosc);
          id(grzalka_moc_przy_grid_w) = id(grzalka_moc).state / 100.0f * 1500.0f;

  - platform: homeassistant
    id: pv_power_ha
    entity_id: sensor.inverter_pv1_power
    on_value:
      - lambda: |-
          id(pv_power_wartosc) = x;
      - script.execute: szybka_reakcja_pv

  - platform: homeassistant
    id: licznik_import_ha
    entity_id: sensor.licznik_energii_wm_bus_gateway_energia_pobrana

  - platform: homeassistant
    id: licznik_export_ha
    entity_id: sensor.licznik_energii_wm_bus_gateway_energia_oddana

  - platform: homeassistant
    id: temp_cwu_ha
    entity_id: sensor.defro_pelet_temperatura_c_w_u_temperatura
    on_value:
      - lambda: |-
          if (std::isnan(x)) {
            id(temp_cwu_ma_odczyt) = false;
            ESP_LOGE("TERMOSTAT", "Odczyt temperatury CWU jest niepoprawny. Wylaczam grzalke i tryby pracy!");
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }

          id(temp_cwu_wartosc) = x;
          id(temp_cwu_ma_odczyt) = true;
          float t_max = id(temp_max_ustawienie).state;
          if (!std::isnan(x) && !std::isnan(t_max) && x >= t_max &&
              (id(tryb_auto).state || id(tryb_manual).state || id(grzalka_moc).state > 0.0f)) {
            ESP_LOGE("TERMOSTAT", "Bojler osiagnal zadana temperature (%.1fC >= %.0fC). Wylaczam grzalke i tryby pracy!", x, t_max);
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else if (!std::isnan(t_max) && x < t_max && !id(tryb_auto).state) {
            ESP_LOGW("TERMOSTAT", "Temperatura CWU %.1fC spadla ponizej nastawy %.0fC. Wlaczam AUTO.", x, t_max);
            id(tryb_auto).turn_on();
          }

  - platform: homeassistant
    id: temp_cwu_ha_alt_defro
    entity_id: sensor.defro_pelet_temperatura_c_w_u
    on_value:
      - lambda: |-
          if (std::isnan(x)) return;

          id(temp_cwu_wartosc) = x;
          id(temp_cwu_ma_odczyt) = true;
          ESP_LOGD("TERMOSTAT", "Odczyt temperatury CWU z alternatywnej encji Defro: %.1fC", x);

          float t_max = id(temp_max_ustawienie).state;
          if (!std::isnan(t_max) && x >= t_max &&
              (id(tryb_auto).state || id(tryb_manual).state || id(grzalka_moc).state > 0.0f)) {
            ESP_LOGE("TERMOSTAT", "Bojler osiagnal zadana temperature (%.1fC >= %.0fC). Wylaczam grzalke i tryby pracy!", x, t_max);
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else if (!std::isnan(t_max) && x < t_max && !id(tryb_auto).state) {
            ESP_LOGW("TERMOSTAT", "Temperatura CWU %.1fC spadla ponizej nastawy %.0fC. Wlaczam AUTO.", x, t_max);
            id(tryb_auto).turn_on();
          }

  - platform: homeassistant
    id: temp_cwu_ha_alt_short
    entity_id: sensor.temperatura_c_w_u
    on_value:
      - lambda: |-
          if (std::isnan(x)) return;

          id(temp_cwu_wartosc) = x;
          id(temp_cwu_ma_odczyt) = true;
          ESP_LOGD("TERMOSTAT", "Odczyt temperatury CWU z encji sensor.temperatura_c_w_u: %.1fC", x);

          float t_max = id(temp_max_ustawienie).state;
          if (!std::isnan(t_max) && x >= t_max &&
              (id(tryb_auto).state || id(tryb_manual).state || id(grzalka_moc).state > 0.0f)) {
            ESP_LOGE("TERMOSTAT", "Bojler osiagnal zadana temperature (%.1fC >= %.0fC). Wylaczam grzalke i tryby pracy!", x, t_max);
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else if (!std::isnan(t_max) && x < t_max && !id(tryb_auto).state) {
            ESP_LOGW("TERMOSTAT", "Temperatura CWU %.1fC spadla ponizej nastawy %.0fC. Wlaczam AUTO.", x, t_max);
            id(tryb_auto).turn_on();
          }

  - platform: homeassistant
    id: temp_cwu_ha_alt_compact
    entity_id: sensor.temperatura_cwu
    on_value:
      - lambda: |-
          if (std::isnan(x)) return;

          id(temp_cwu_wartosc) = x;
          id(temp_cwu_ma_odczyt) = true;
          ESP_LOGD("TERMOSTAT", "Odczyt temperatury CWU z encji sensor.temperatura_cwu: %.1fC", x);

          float t_max = id(temp_max_ustawienie).state;
          if (!std::isnan(t_max) && x >= t_max &&
              (id(tryb_auto).state || id(tryb_manual).state || id(grzalka_moc).state > 0.0f)) {
            ESP_LOGE("TERMOSTAT", "Bojler osiagnal zadana temperature (%.1fC >= %.0fC). Wylaczam grzalke i tryby pracy!", x, t_max);
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else if (!std::isnan(t_max) && x < t_max && !id(tryb_auto).state) {
            ESP_LOGW("TERMOSTAT", "Temperatura CWU %.1fC spadla ponizej nastawy %.0fC. Wlaczam AUTO.", x, t_max);
            id(tryb_auto).turn_on();
          }

  - platform: template
    name: "Moc sieci Waty"
    id: moc_sieci_waty
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      return id(grid_power_wartosc);
    update_interval: 5s

  - platform: template
    name: "Bilans sieci (Pobór lub Oddanie)"
    id: bilans_pobrana_oddana
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:swap-horizontal"
    lambda: |-
      return id(grid_power_wartosc);
    update_interval: 5s

  - platform: template
    name: "Moc grzałki W"
    id: moc_grzalki_w
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      return id(grzalka_moc).state / 100.0f * 1500.0f;
    update_interval: 5s

  - platform: template
    name: "Bilans godziny"
    id: bilans_godzinowy_energia
    unit_of_measurement: "Wh"
    accuracy_decimals: 0
    icon: "mdi:counter"
    lambda: |-
      return id(bilans_godzinowy_wh);
    update_interval: 30s

  - platform: template
    name: "Dostępna moc z bufora"
    id: bilans_godzinowy_moc_banku
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:battery-clock"
    lambda: |-
      return id(moc_banku_godzinowego_w);
    update_interval: 30s

  - platform: template
    name: "Moc chwilowa 30s"
    id: bilans_godzinowy_moc_okna
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:chart-line"
    lambda: |-
      return id(srednia_moc_okna_w);
    update_interval: 30s

text_sensor:
  - platform: template
    name: "Status bilansu grzałki"
    id: status_bilansu_grzalki
    icon: "mdi:information-outline"
    lambda: |-
      if (!id(temp_cwu_ma_odczyt)) {
        return std::string("Brak temperatury CWU");
      }

      float t_max = id(temp_max_ustawienie).state;
      if (!std::isnan(t_max) && id(temp_cwu_wartosc) >= t_max) {
        return std::string("Temperatura osiągnięta");
      }

      if (id(grid_power_wartosc) > 50.0f) {
        return std::string("Pobór z sieci");
      }

      float wymagany_bufor_wh = id(bufor_startu_grzalki_wh) + id(rezerwa_exportu_godzinowego_wh);
      if (id(tryb_auto).state && !id(grzalka_auto_start_w_godzinie) &&
          id(bilans_godzinowy_wh) < wymagany_bufor_wh) {
        return std::string("Zbieram bufor");
      }

      if (id(grzalka_moc).state > 0.0f) {
        return std::string("Grzanie");
      }

      if (id(moc_banku_godzinowego_w) > 0.0f || id(grid_power_wartosc) < -id(docelowy_export_w)) {
        return std::string("Można grzać");
      }

      return std::string("Czekam na eksport");
    update_interval: 10s

# -- Przelaczniki trybow ---------------------------------------------------
switch:
  - platform: template
    name: "Tryb AUTO (PV)"
    id: tryb_auto
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - switch.turn_off: tryb_manual
      - logger.log: "Tryb AUTO aktywny"
      - number.set:
          id: grzalka_moc
          value: 0
      - delay: 1s
      - script.execute: regulacja_auto
    turn_off_action:
      - logger.log: "Tryb AUTO wylaczony"
      - script.stop: regulacja_auto
      - script.stop: szybka_reakcja_pv
      - number.set:
          id: grzalka_moc
          value: 0

  - platform: template
    name: "Tryb MANUAL"
    id: tryb_manual
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - switch.turn_off: tryb_auto
      - logger.log: "Tryb MANUAL aktywny"
      - lambda: |-
          float t_max = id(temp_max_ustawienie).state;
          float t_wody = id(temp_cwu_ha).state;
          bool temp_ok = !std::isnan(t_wody);
          if (!temp_ok && id(temp_cwu_ma_odczyt)) {
            t_wody = id(temp_cwu_wartosc);
            temp_ok = !std::isnan(t_wody);
          }

          if (!temp_ok || std::isnan(t_max) || t_wody >= t_max) {
            if (!temp_ok || std::isnan(t_max)) {
              ESP_LOGE("TERMOSTAT", "Nie wlaczam MANUAL: brak poprawnej temperatury CWU albo nastawy.");
            } else {
              ESP_LOGE("TERMOSTAT", "Nie wlaczam MANUAL: woda %.1fC >= nastawa %.0fC.", t_wody, t_max);
            }
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }

          id(grzalka_pwm).set_level(id(grzalka_moc).state / 100.0f);
          id(led_pwm).set_level(id(grzalka_moc).state / 100.0f);
    turn_off_action:
      - logger.log: "Tryb MANUAL wylaczony"
      - number.set:
          id: grzalka_moc
          value: 0

# -- Skrypty logiczne ------------------------------------------------------
script:
  - id: reakcja_na_suwak_temp
    mode: restart
    then:
      - lambda: |-
          float t_max = id(temp_max_ustawienie).state;
          float t_wody = id(temp_cwu_ha).state;
          bool temp_ok = !std::isnan(t_wody);
          if (!temp_ok && id(temp_cwu_ma_odczyt)) {
            t_wody = id(temp_cwu_wartosc);
            temp_ok = !std::isnan(t_wody);
          }

          if (!temp_ok) {
            ESP_LOGE("SUWAK", "Brak poprawnego odczytu temperatury CWU. Wylaczam grzalke i tryby pracy.");
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else if (!std::isnan(t_max) && t_wody >= t_max) {
            ESP_LOGE("SUWAK", "Zmniejszono nastawe! Woda (%.1fC) >= Nastawa (%.0fC). Wylaczam sterowanie.", t_wody, t_max);
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else {
            ESP_LOGD("SUWAK", "Temperatura bezpieczna. Nie zmieniam trybu pracy.");
          }

  - id: szybka_reakcja_pv
    mode: restart
    then:
      - lambda: |-
          if (!id(tryb_auto).state) return;
          float t_max = id(temp_max_ustawienie).state;
          if (!id(temp_cwu_ma_odczyt) || std::isnan(t_max)) {
            ESP_LOGE("TERMOSTAT", "Brak poprawnej temperatury CWU albo nastawy podczas szybkiej reakcji. Wylaczam grzalke i tryby pracy.");
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }
          if (id(temp_cwu_wartosc) >= t_max) {
            ESP_LOGE("TERMOSTAT", "Temperatura CWU %.1fC >= nastawa %.0fC podczas szybkiej reakcji. Wylaczam grzalke i tryby pracy.", id(temp_cwu_wartosc), t_max);
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }

          float prod_pv = id(pv_power_wartosc);
          float aktualny_prog = id(grzalka_moc).state;
          float moc_banku_w = id(moc_banku_godzinowego_w);

          if (std::isnan(prod_pv)) return;

          float moc_grzalki_w = (aktualny_prog / 100.0f) * 1500.0f;
          float skorygowana_moc_sieci_w = id(grid_power_wartosc);
          uint32_t wiek_grid_ms = id(grid_power_ostatni_odczyt_ms) == 0 ? 0 : millis() - id(grid_power_ostatni_odczyt_ms);
          if (id(grid_power_ostatni_odczyt_ms) != 0 && wiek_grid_ms <= 45000) {
            float zmiana_pv_w = prod_pv - id(pv_power_przy_grid_wartosc);
            float zmiana_grzalki_w = moc_grzalki_w - id(grzalka_moc_przy_grid_w);
            skorygowana_moc_sieci_w = id(grid_power_wartosc) - zmiana_pv_w + zmiana_grzalki_w;
          }
          float chwilowy_bilans_sieci_w = -skorygowana_moc_sieci_w;
          float dostepna_moc_grzalki_w = moc_grzalki_w + chwilowy_bilans_sieci_w + moc_banku_w - id(docelowy_export_w);
          if (dostepna_moc_grzalki_w < 0.0f) dostepna_moc_grzalki_w = 0.0f;
          if (dostepna_moc_grzalki_w > 1500.0f) dostepna_moc_grzalki_w = 1500.0f;

          // Przy bilansowaniu godzinowym grzalka moze korzystac z chwilowej nadwyzki sieci
          // oraz dodatniego banku energii, ale reaguje od razu na realny pobor z sieci.
          if (aktualny_prog > 0.0f && dostepna_moc_grzalki_w + 100.0f < moc_grzalki_w) {
            float wolna_moc = dostepna_moc_grzalki_w - 50.0f;
            if (wolna_moc < 0.0f) wolna_moc = 0.0f;

            float nowy_prog = (wolna_moc / 1500.0f) * 100.0f;
            nowy_prog = std::round(nowy_prog / 5.0f) * 5.0f;

            if (nowy_prog > 0.0f && nowy_prog < 15.0f) nowy_prog = 0.0f;

            if (nowy_prog > 100.0f) nowy_prog = 100.0f;
            if (nowy_prog < 0.0f) nowy_prog = 0.0f;

            if (nowy_prog != aktualny_prog) {
              ESP_LOGE("BEZPIECZNIK", "Szybkie ciecie. Siec=%.0fW skoryg=%.0fW wiek=%us bank=%.0fW grzalka=%.0fW cel_export=%.0fW dostepne=%.0fW. Ustawiam %.0f%%", id(grid_power_wartosc), skorygowana_moc_sieci_w, wiek_grid_ms / 1000, moc_banku_w, moc_grzalki_w, id(docelowy_export_w), dostepna_moc_grzalki_w, nowy_prog);
              id(grzalka_moc).publish_state(nowy_prog);
              id(grzalka_pwm).set_level(nowy_prog / 100.0f);
              id(led_pwm).set_level(nowy_prog / 100.0f);
            }
          }

          // Częsty odczyt PV sluzy tylko do szybkiego ciecia mocy.
          // Zwiekszanie mocy zostaje w glownej petli, ktora widzi pelny odczyt licznikow.
      - if:
          condition:
            lambda: |-
              if (!id(tryb_auto).state) return false;
              float aktualny_prog = id(grzalka_moc).state;
              float moc_grzalki_w = (aktualny_prog / 100.0f) * 1500.0f;
              float skorygowana_moc_sieci_w = id(grid_power_wartosc);
              uint32_t wiek_grid_ms = id(grid_power_ostatni_odczyt_ms) == 0 ? 0 : millis() - id(grid_power_ostatni_odczyt_ms);
              if (id(grid_power_ostatni_odczyt_ms) != 0 && wiek_grid_ms <= 45000) {
                float zmiana_pv_w = id(pv_power_wartosc) - id(pv_power_przy_grid_wartosc);
                float zmiana_grzalki_w = moc_grzalki_w - id(grzalka_moc_przy_grid_w);
                skorygowana_moc_sieci_w = id(grid_power_wartosc) - zmiana_pv_w + zmiana_grzalki_w;
              }
              float chwilowy_bilans_sieci_w = -skorygowana_moc_sieci_w;
              float moc_banku_w = id(moc_banku_godzinowego_w);
              float dostepna_moc_grzalki_w = moc_grzalki_w + chwilowy_bilans_sieci_w + moc_banku_w - id(docelowy_export_w);
              return dostepna_moc_grzalki_w + 100.0f < moc_grzalki_w;
          then:
            - script.stop: regulacja_auto

  - id: regulacja_auto
    mode: restart
    then:
      - lambda: |-
          float c_import = id(licznik_import_ha).state;
          float c_export = id(licznik_export_ha).state;

          if (std::isnan(c_import) || std::isnan(c_export)) {
            ESP_LOGD("BILANS_H", "Oczekiwanie na poprawne liczniki energii z Home Assistant...");
            return;
          }

          auto teraz = id(ha_time).now();
          bool czas_ok = teraz.is_valid();
          int aktualna_godzina = czas_ok ? teraz.hour : -1;

          auto reset_bilansu = [&](const char *powod) {
            id(godzina_bilansu) = aktualna_godzina;
            id(start_import_kwh_godzina) = c_import;
            id(start_export_kwh_godzina) = c_export;
            id(ostatni_import_kwh) = c_import;
            id(ostatni_export_kwh) = c_export;
            id(ostatni_odczyt_ms) = millis();
            id(bilans_godzinowy_wh) = 0.0f;
            id(srednia_moc_okna_w) = 0.0f;
            id(moc_banku_godzinowego_w) = 0.0f;
            id(grzalka_auto_start_w_godzinie) = false;
            id(bilans_zainicjowany) = true;
            ESP_LOGW("BILANS_H", "Start/reset bilansu godzinowego: %s | import=%.3fkWh export=%.3fkWh", powod, c_import, c_export);
          };

          if (!id(bilans_zainicjowany)) {
            reset_bilansu("pierwszy odczyt");
            return;
          }

          if (czas_ok && aktualna_godzina != id(godzina_bilansu)) {
            reset_bilansu("nowa godzina");
            return;
          }

          if (c_import < id(start_import_kwh_godzina) || c_export < id(start_export_kwh_godzina) ||
              c_import < id(ostatni_import_kwh) || c_export < id(ostatni_export_kwh)) {
            reset_bilansu("licznik cofniety/zresetowany");
            return;
          }

          uint32_t teraz_ms = millis();
          float takt_sekundy = (teraz_ms - id(ostatni_odczyt_ms)) / 1000.0f;
          if (takt_sekundy < 5.0f || takt_sekundy > 300.0f) {
            takt_sekundy = 30.0f;
          }

          float delta_import_wh = (c_import - id(ostatni_import_kwh)) * 1000.0f;
          float delta_export_wh = (c_export - id(ostatni_export_kwh)) * 1000.0f;

          id(ostatni_import_kwh) = c_import;
          id(ostatni_export_kwh) = c_export;
          id(ostatni_odczyt_ms) = teraz_ms;

          float srednia_moc_sieci_w = ((delta_import_wh - delta_export_wh) / takt_sekundy) * 3600.0f;
          float realny_bilans_sieci_w = -srednia_moc_sieci_w;
          id(srednia_moc_okna_w) = realny_bilans_sieci_w;

          float import_godzina_wh = (c_import - id(start_import_kwh_godzina)) * 1000.0f;
          float export_godzina_wh = (c_export - id(start_export_kwh_godzina)) * 1000.0f;
          id(bilans_godzinowy_wh) = export_godzina_wh - import_godzina_wh;

          float pozostalo_s = 1800.0f;
          if (czas_ok) {
            pozostalo_s = (59.0f - teraz.minute) * 60.0f + (60.0f - teraz.second);
            if (pozostalo_s < 30.0f) pozostalo_s = 30.0f;
          }

          float moc_z_banku_w = 0.0f;
          float bilans_do_wykorzystania_wh = id(bilans_godzinowy_wh) - id(rezerwa_exportu_godzinowego_wh);
          if (bilans_do_wykorzystania_wh > 5.0f) {
            moc_z_banku_w = (bilans_do_wykorzystania_wh * 3600.0f) / pozostalo_s;
            if (moc_z_banku_w > 1500.0f) moc_z_banku_w = 1500.0f;
          }
          id(moc_banku_godzinowego_w) = moc_z_banku_w;

          // Licznik bilansu ma dzialac zawsze; ponizej zaczyna sie tylko regulacja AUTO.
          if (!id(tryb_auto).state) {
            ESP_LOGD("BILANS_H", "Licznik aktywny bez regulacji AUTO. Okno30s=%.0fW | bilans_h=%.0fWh | bank=%.0fW", realny_bilans_sieci_w, id(bilans_godzinowy_wh), moc_z_banku_w);
            return;
          }

          float t_max = id(temp_max_ustawienie).state;
          if (!id(temp_cwu_ma_odczyt) || std::isnan(t_max)) {
            ESP_LOGE("TERMOSTAT", "Brak poprawnej temperatury CWU albo nastawy w AUTO. Wylaczam grzalke i tryby pracy.");
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }
          if (id(temp_cwu_wartosc) >= t_max) {
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }

          float aktualny_prog = id(grzalka_moc).state;
          float nowy_prog = aktualny_prog;

          float moc_grzalki_w = (aktualny_prog / 100.0f) * 1500.0f;
          float skorygowana_moc_sieci_w = id(grid_power_wartosc);
          uint32_t wiek_grid_ms = id(grid_power_ostatni_odczyt_ms) == 0 ? 0 : millis() - id(grid_power_ostatni_odczyt_ms);
          if (id(grid_power_ostatni_odczyt_ms) != 0 && wiek_grid_ms <= 45000) {
            float zmiana_pv_w = id(pv_power_wartosc) - id(pv_power_przy_grid_wartosc);
            float zmiana_grzalki_w = moc_grzalki_w - id(grzalka_moc_przy_grid_w);
            skorygowana_moc_sieci_w = id(grid_power_wartosc) - zmiana_pv_w + zmiana_grzalki_w;
          }
          float chwilowy_bilans_sieci_w = -skorygowana_moc_sieci_w;
          float dostepna_moc_grzalki_w = moc_grzalki_w + chwilowy_bilans_sieci_w + moc_z_banku_w - id(docelowy_export_w);
          if (dostepna_moc_grzalki_w < 0.0f) dostepna_moc_grzalki_w = 0.0f;
          if (dostepna_moc_grzalki_w > 1500.0f) dostepna_moc_grzalki_w = 1500.0f;

          if (aktualny_prog == 0.0f && dostepna_moc_grzalki_w < 200.0f) {
            return;
          }

          float wymagany_bufor_przed_startem_wh = id(bufor_startu_grzalki_wh) + id(rezerwa_exportu_godzinowego_wh);
          if (aktualny_prog == 0.0f && !id(grzalka_auto_start_w_godzinie) &&
              id(bilans_godzinowy_wh) < wymagany_bufor_przed_startem_wh) {
            ESP_LOGD("BILANS_H", "Zbieram bufor przed pierwszym startem grzalki: bilans=%.0fWh wymagane=%.0fWh rezerwa=%.0fWh", id(bilans_godzinowy_wh), wymagany_bufor_przed_startem_wh, id(rezerwa_exportu_godzinowego_wh));
            return;
          }

          nowy_prog = (dostepna_moc_grzalki_w / 1500.0f) * 100.0f;

          nowy_prog = std::round(nowy_prog / 5.0f) * 5.0f;

          // Podbijanie mocy robimy ostroznie, bo licznik sieci odswieza sie wolniej
          // niz zmiany PWM grzalki. Ciecie mocy nadal moze byc natychmiastowe.
          bool grid_po_zmianie_grzalki = id(grid_power_ostatni_odczyt_ms) != 0 &&
              (id(grzalka_moc_ostatnia_zmiana_ms) == 0 ||
               (int32_t) (id(grid_power_ostatni_odczyt_ms) - id(grzalka_moc_ostatnia_zmiana_ms)) >= 0);
          uint32_t czas_od_zmiany_ms = id(grzalka_moc_ostatnia_zmiana_ms) == 0 ? 0 : millis() - id(grzalka_moc_ostatnia_zmiana_ms);
          bool grzalka_ustabilizowana = id(grzalka_moc_ostatnia_zmiana_ms) == 0 || czas_od_zmiany_ms >= 60000;
          if (aktualny_prog > 0.0f && nowy_prog > aktualny_prog && (!grid_po_zmianie_grzalki || !grzalka_ustabilizowana)) {
            ESP_LOGD("BILANS_H", "Czekam ze wzrostem mocy na stabilny odczyt po zmianie grzalki. cel=%.0f%% aktualnie=%.0f%% od_zmiany=%us grid_po=%s", nowy_prog, aktualny_prog, czas_od_zmiany_ms / 1000, grid_po_zmianie_grzalki ? "tak" : "nie");
            nowy_prog = aktualny_prog;
          }

          float maks_wzrost = aktualny_prog == 0.0f ? 35.0f : 25.0f;
          if (nowy_prog > aktualny_prog + maks_wzrost) {
            nowy_prog = aktualny_prog + maks_wzrost;
          }

          if (nowy_prog > 0.0f && nowy_prog < 15.0f) {
            nowy_prog = 0.0f;
            ESP_LOGD("MIN_POWER", "Za mala nadwyzka na prog 200W. Wylaczam.");
          }

          if (nowy_prog > 100.0f) nowy_prog = 100.0f;
          if (nowy_prog < 0.0f) nowy_prog = 0.0f;

          ESP_LOGW("BILANS_H", "Siec=%.0fW | skoryg=%.0fW | wiek=%us | chwilowo=%.0fW | Okno30s=%.0fW | bilans_h=%.0fWh | bank=%.0fW | cel_export=%.0fW | dostepne=%.0fW | cel=%.0f%%", id(grid_power_wartosc), skorygowana_moc_sieci_w, wiek_grid_ms / 1000, chwilowy_bilans_sieci_w, realny_bilans_sieci_w, id(bilans_godzinowy_wh), moc_z_banku_w, id(docelowy_export_w), dostepna_moc_grzalki_w, nowy_prog);

          if (nowy_prog != aktualny_prog) {
            id(grzalka_moc).publish_state(nowy_prog);
            id(grzalka_pwm).set_level(nowy_prog / 100.0f);
            id(led_pwm).set_level(nowy_prog / 100.0f);
            if (aktualny_prog == 0.0f && nowy_prog > 0.0f) {
              id(grzalka_auto_start_w_godzinie) = true;
              ESP_LOGW("BILANS_H", "Pierwszy start grzalki w tej godzinie po uzbieraniu bufora %.0fWh. bilans=%.0fWh", wymagany_bufor_przed_startem_wh, id(bilans_godzinowy_wh));
            }
          }
