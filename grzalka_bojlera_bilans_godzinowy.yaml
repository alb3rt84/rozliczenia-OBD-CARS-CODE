text_sensor:
  - platform: template
    name: "Status bilansu grzałki"
    id: status_bilansu_grzalki
    icon: "mdi:information-outline"
    lambda: |-
      if (!id(temp_cwu_ma_odczyt)) {
        return std::string("Brak temperatury CWU");
      }

      float t_max = id(temp_max_ustawienie).state;
      if (!std::isnan(t_max) && id(temp_cwu_wartosc) >= t_max) {
        return std::string("Temperatura osiągnięta");
      }
      if (!std::isnan(t_max) && id(auto_wylaczone_przez_termostat) &&
          id(temp_cwu_wartosc) > t_max - id(histereza_temp_cwu)) {
        return std::string("Czekam na spadek temperatury");
      }
      if (id(licznik_energii_przeterminowany)) {
        return std::string("Brak danych licznika");
      }

      if (id(grid_power_wartosc) > 50.0f) {
        return std::string("Pobór z sieci");
      }

      float wymagany_bufor_wh = id(bufor_startu_grzalki_wh) + id(rezerwa_exportu_godzinowego_wh);
      if (!id(grzalka_auto_start_w_godzinie) && id(bilans_godzinowy_wh) < wymagany_bufor_wh) {
        return std::string("Zbieram bufor");
      }

      if (!std::isnan(id(grzalka_moc).state) && id(grzalka_moc).state > 0.0f) {
        return std::string("Grzanie");
      }

      if (id(srednia_moc_okna_w) > id(docelowy_export_w) || id(grid_power_wartosc) < -id(docelowy_export_w)) {
        return std::string("Można grzać");
      }

      return std::string("Czekam na eksport");
    update_interval: 10s

# -- Przelaczniki trybow ---------------------------------------------------
switch:
  - platform: template
    name: "Tryb AUTO (PV)"
    id: tryb_auto
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - switch.turn_off: tryb_manual
      - logger.log: "Tryb AUTO aktywny"
      - lambda: |-
          id(auto_wylaczone_przez_termostat) = false;
          id(grzalka_moc_zmiana_wewnetrzna) = true;
      - number.set:
          id: grzalka_moc
          value: 0
      - lambda: |-
          id(grzalka_moc_zmiana_wewnetrzna) = false;
      - delay: 1s
      - script.execute: regulacja_auto
    turn_off_action:
      - logger.log: "Tryb AUTO wylaczony"
      - script.stop: regulacja_auto
      - script.stop: szybka_reakcja_pv
      - number.set:
          id: grzalka_moc
          value: 0

  - platform: template
    name: "Tryb MANUAL"
    id: tryb_manual
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - switch.turn_off: tryb_auto
      - logger.log: "Tryb MANUAL aktywny"
      - lambda: |-
          id(auto_wylaczone_przez_termostat) = false;
          float t_max = id(temp_max_ustawienie).state;
          float t_wody = id(temp_cwu_ha).state;
          bool temp_ok = !std::isnan(t_wody);
          if (!temp_ok && id(temp_cwu_ma_odczyt)) {
            t_wody = id(temp_cwu_wartosc);
            temp_ok = !std::isnan(t_wody);
          }

          if (!temp_ok || std::isnan(t_max) || t_wody >= t_max) {
            if (!temp_ok || std::isnan(t_max)) {
              ESP_LOGE("TERMOSTAT", "Nie wlaczam MANUAL: brak poprawnej temperatury CWU albo nastawy.");
            } else {
              ESP_LOGE("TERMOSTAT", "Nie wlaczam MANUAL: woda %.1fC >= nastawa %.0fC.", t_wody, t_max);
            }
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }

          float moc_proc = id(grzalka_moc).state;
          if (std::isnan(moc_proc) || moc_proc < 0.0f) moc_proc = 0.0f;
          if (moc_proc > 100.0f) moc_proc = 100.0f;
          id(grzalka_moc_zaakceptowana_proc) = moc_proc;
          id(grzalka_pwm).set_level(moc_proc / 100.0f);
          id(led_pwm).set_level(moc_proc / 100.0f);
    turn_off_action:
      - logger.log: "Tryb MANUAL wylaczony"
      - number.set:
          id: grzalka_moc
          value: 0

# -- Skrypty logiczne ------------------------------------------------------
script:
  - id: aktualizuj_bilans_mocy_sieci
    mode: restart
    then:
      - lambda: |-
          if (!id(grid_import_power_ma_odczyt) || !id(grid_export_power_ma_odczyt)) {
            return;
          }

          float import_kw = id(grid_import_power_kw_wartosc);
          float export_kw = id(grid_export_power_kw_wartosc);
          if (std::isnan(import_kw) || import_kw < 0.0f) import_kw = 0.0f;
          if (std::isnan(export_kw) || export_kw < 0.0f) export_kw = 0.0f;

          id(grid_power_wartosc) = (import_kw - export_kw) * 1000.0f;
          id(grid_power_ostatni_odczyt_ms) = millis();
          id(pv_power_przy_grid_wartosc) = std::isnan(id(pv_power_wartosc)) ? 0.0f : id(pv_power_wartosc);
          float moc_proc = id(grzalka_moc).state;
          if (std::isnan(moc_proc)) moc_proc = 0.0f;
          id(grzalka_moc_przy_grid_w) = moc_proc / 100.0f * 1500.0f;

          id(moc_sieci_waty).publish_state(id(grid_power_wartosc));
          id(bilans_pobrana_oddana).publish_state(id(grid_power_wartosc));
          id(moc_poboru_netto).publish_state(id(grid_power_wartosc) > 0.0f ? id(grid_power_wartosc) : 0.0f);
          id(moc_oddawana_netto).publish_state(id(grid_power_wartosc) < 0.0f ? -id(grid_power_wartosc) : 0.0f);

  - id: publikuj_stany_lokalne
    mode: restart
    then:
      - lambda: |-
          if (std::isnan(id(energia_grzalki_kwh))) id(energia_grzalki_kwh) = 0.0f;
          if (std::isnan(id(energia_grzalki_nadwyzka_kwh))) id(energia_grzalki_nadwyzka_kwh) = 0.0f;
          if (std::isnan(id(energia_grzalki_import_kwh))) id(energia_grzalki_import_kwh) = 0.0f;
          if (std::isnan(id(czas_pracy_grzalki_h))) id(czas_pracy_grzalki_h) = 0.0f;

          float moc_proc = id(grzalka_moc).state;
          if (std::isnan(moc_proc)) moc_proc = id(grzalka_moc_zaakceptowana_proc);
          if (std::isnan(moc_proc)) moc_proc = 0.0f;
          if (moc_proc > 100.0f) moc_proc = 100.0f;
          if (moc_proc < 0.0f) moc_proc = 0.0f;

          float sprawnosc = id(energia_grzalki_kwh) > 0.0f
              ? (id(energia_grzalki_nadwyzka_kwh) / id(energia_grzalki_kwh)) * 100.0f
              : 0.0f;
          if (std::isnan(sprawnosc)) sprawnosc = 0.0f;
          if (sprawnosc > 100.0f) sprawnosc = 100.0f;
          if (sprawnosc < 0.0f) sprawnosc = 0.0f;

          id(grzalka_moc_zmiana_wewnetrzna) = true;
          id(grzalka_moc).publish_state(moc_proc);
          id(grzalka_moc_zmiana_wewnetrzna) = false;
          id(grzalka_moc_zaakceptowana_proc) = moc_proc;
          id(moc_grzalki_w).publish_state(moc_proc / 100.0f * 1500.0f);
          id(zuzycie_grzalki_kwh).publish_state(id(energia_grzalki_kwh));
          id(zuzycie_grzalki_nadwyzka_kwh).publish_state(id(energia_grzalki_nadwyzka_kwh));
          id(zuzycie_grzalki_import_kwh).publish_state(id(energia_grzalki_import_kwh));
          id(sprawnosc_grzalki_proc).publish_state(sprawnosc);
          id(czas_pracy_grzalki).publish_state(id(czas_pracy_grzalki_h));
          id(moc_sieci_waty).publish_state(id(grid_power_wartosc));
          id(bilans_pobrana_oddana).publish_state(id(grid_power_wartosc));
          id(moc_poboru_netto).publish_state(id(grid_power_wartosc) > 0.0f ? id(grid_power_wartosc) : 0.0f);
          id(moc_oddawana_netto).publish_state(id(grid_power_wartosc) < 0.0f ? -id(grid_power_wartosc) : 0.0f);
          id(bilans_godzinowy_energia).publish_state(id(bilans_godzinowy_wh));
          id(pobor_godziny).publish_state(id(import_godzina_wh_wartosc));
          id(oddanie_godziny).publish_state(id(export_godzina_wh_wartosc));
          id(bilans_godzinowy_moc_banku).publish_state(id(moc_banku_godzinowego_w));
          id(bilans_godzinowy_moc_okna).publish_state(id(srednia_moc_okna_w));
          ESP_LOGD("STANY", "Opublikowano lokalne stany po starcie lub ponownym polaczeniu.");

  - id: aktualizuj_statystyki_grzalki
    mode: queued
    then:
      - lambda: |-
          uint32_t teraz_ms = millis();
          if (id(ostatni_pomiar_statystyk_ms) == 0) {
            id(ostatni_pomiar_statystyk_ms) = teraz_ms;
            return;
          }

          float dt_h = (teraz_ms - id(ostatni_pomiar_statystyk_ms)) / 3600000.0f;
          id(ostatni_pomiar_statystyk_ms) = teraz_ms;

          if (dt_h <= 0.0f || dt_h > 0.1f) {
            return;
          }

          if (std::isnan(id(energia_grzalki_kwh))) id(energia_grzalki_kwh) = 0.0f;
          if (std::isnan(id(energia_grzalki_nadwyzka_kwh))) id(energia_grzalki_nadwyzka_kwh) = 0.0f;
          if (std::isnan(id(energia_grzalki_import_kwh))) id(energia_grzalki_import_kwh) = 0.0f;
          if (std::isnan(id(czas_pracy_grzalki_h))) id(czas_pracy_grzalki_h) = 0.0f;

          float moc_proc = id(grzalka_moc).state;
          if (std::isnan(moc_proc) || moc_proc < 0.0f) moc_proc = 0.0f;
          if (moc_proc > 100.0f) moc_proc = 100.0f;
          float moc_kw = moc_proc / 100.0f * 1.5f;
          if (std::isnan(moc_kw) || moc_kw <= 0.0f) {
            return;
          }

          float energia_okna_kwh = moc_kw * dt_h;
          float import_kw = id(grid_power_wartosc) > 0.0f ? id(grid_power_wartosc) / 1000.0f : 0.0f;
          if (std::isnan(import_kw) || import_kw < 0.0f) import_kw = 0.0f;
          if (import_kw > moc_kw) import_kw = moc_kw;

          float energia_import_kwh = import_kw * dt_h;
          float energia_nadwyzka_kwh = energia_okna_kwh - energia_import_kwh;
          if (energia_nadwyzka_kwh < 0.0f) energia_nadwyzka_kwh = 0.0f;

          id(energia_grzalki_kwh) += energia_okna_kwh;
          id(energia_grzalki_import_kwh) += energia_import_kwh;
          id(energia_grzalki_nadwyzka_kwh) += energia_nadwyzka_kwh;
          id(czas_pracy_grzalki_h) += dt_h;
          id(zuzycie_grzalki_kwh).publish_state(id(energia_grzalki_kwh));
          id(zuzycie_grzalki_import_kwh).publish_state(id(energia_grzalki_import_kwh));
          id(zuzycie_grzalki_nadwyzka_kwh).publish_state(id(energia_grzalki_nadwyzka_kwh));
          float sprawnosc = id(energia_grzalki_kwh) > 0.0f
              ? (id(energia_grzalki_nadwyzka_kwh) / id(energia_grzalki_kwh)) * 100.0f
              : 0.0f;
          if (std::isnan(sprawnosc)) sprawnosc = 0.0f;
          if (sprawnosc > 100.0f) sprawnosc = 100.0f;
          if (sprawnosc < 0.0f) sprawnosc = 0.0f;
          id(sprawnosc_grzalki_proc).publish_state(sprawnosc);
          id(czas_pracy_grzalki).publish_state(id(czas_pracy_grzalki_h));

  - id: reakcja_na_suwak_temp
    mode: restart
    then:
      - lambda: |-
          float t_max = id(temp_max_ustawienie).state;
          float t_wody = id(temp_cwu_ha).state;
          bool temp_ok = !std::isnan(t_wody);
          if (!temp_ok && id(temp_cwu_ma_odczyt)) {
            t_wody = id(temp_cwu_wartosc);
            temp_ok = !std::isnan(t_wody);
          }

          if (!temp_ok) {
            ESP_LOGE("SUWAK", "Brak poprawnego odczytu temperatury CWU. Wylaczam grzalke i tryby pracy.");
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else if (!std::isnan(t_max) && t_wody >= t_max) {
            ESP_LOGE("SUWAK", "Zmniejszono nastawe! Woda (%.1fC) >= Nastawa (%.0fC). Wylaczam sterowanie.", t_wody, t_max);
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else {
            ESP_LOGD("SUWAK", "Temperatura bezpieczna. Nie zmieniam trybu pracy.");
          }

  - id: szybka_reakcja_pv
    mode: restart
    then:
      - lambda: |-
          if (!id(tryb_auto).state) return;
          float t_max = id(temp_max_ustawienie).state;
          if (!id(temp_cwu_ma_odczyt) || std::isnan(t_max)) {
            ESP_LOGE("TERMOSTAT", "Brak poprawnej temperatury CWU albo nastawy podczas szybkiej reakcji. Wylaczam grzalke i tryby pracy.");
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }
          if (id(temp_cwu_wartosc) >= t_max) {
            ESP_LOGE("TERMOSTAT", "Temperatura CWU %.1fC >= nastawa %.0fC podczas szybkiej reakcji. Wylaczam grzalke i tryby pracy.", id(temp_cwu_wartosc), t_max);
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }

          uint32_t teraz_ms = millis();
          bool brak_danych_licznika = id(licznik_energii_ostatni_odczyt_ms) == 0 ||
              teraz_ms - id(licznik_energii_ostatni_odczyt_ms) > id(maks_wiek_licznika_energii_ms);
          if (brak_danych_licznika) {
            id(licznik_energii_przeterminowany) = true;
            if (std::isnan(id(grzalka_moc).state) || id(grzalka_moc).state > 0.0f) {
              ESP_LOGE("LICZNIK", "Szybkie zabezpieczenie: brak swiezych danych licznika energii. Wylaczam moc grzalki.");
              id(grzalka_moc_zmiana_wewnetrzna) = true;
              id(grzalka_moc).publish_state(0.0f);
              id(grzalka_moc_zmiana_wewnetrzna) = false;
              id(grzalka_moc_zaakceptowana_proc) = 0.0f;
              id(grzalka_pwm).set_level(0.0f);
              id(led_pwm).set_level(0.0f);
              id(grzalka_moc_ostatnia_zmiana_ms) = teraz_ms;
            }
            return;
          }

          float prod_pv = id(pv_power_wartosc);
          float aktualny_prog = id(grzalka_moc).state;

          if (std::isnan(prod_pv)) prod_pv = id(pv_power_przy_grid_wartosc);
          if (std::isnan(prod_pv)) prod_pv = 0.0f;
          bool aktualny_prog_byl_nan = std::isnan(aktualny_prog);
          if (aktualny_prog_byl_nan || aktualny_prog < 0.0f) aktualny_prog = 0.0f;
          if (aktualny_prog > 100.0f) aktualny_prog = 100.0f;
          if (aktualny_prog_byl_nan) {
            id(grzalka_moc_zmiana_wewnetrzna) = true;
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_moc_zmiana_wewnetrzna) = false;
            id(grzalka_moc_zaakceptowana_proc) = 0.0f;
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            id(grzalka_moc_ostatnia_zmiana_ms) = millis();
          }

          float moc_grzalki_w = (aktualny_prog / 100.0f) * 1500.0f;
          float skorygowana_moc_sieci_w = id(grid_power_wartosc);
          uint32_t wiek_grid_ms = id(grid_power_ostatni_odczyt_ms) == 0 ? 0 : millis() - id(grid_power_ostatni_odczyt_ms);
          if (id(grid_power_ostatni_odczyt_ms) != 0 && wiek_grid_ms <= 45000) {
            float pv_przy_grid_w = std::isnan(id(pv_power_przy_grid_wartosc)) ? prod_pv : id(pv_power_przy_grid_wartosc);
            float grzalka_przy_grid_w = std::isnan(id(grzalka_moc_przy_grid_w)) ? moc_grzalki_w : id(grzalka_moc_przy_grid_w);
            float zmiana_pv_w = prod_pv - pv_przy_grid_w;
            float zmiana_grzalki_w = moc_grzalki_w - grzalka_przy_grid_w;
            skorygowana_moc_sieci_w = id(grid_power_wartosc) - zmiana_pv_w + zmiana_grzalki_w;
          }
          if (std::isnan(skorygowana_moc_sieci_w)) skorygowana_moc_sieci_w = id(grid_power_wartosc);
          if (std::isnan(skorygowana_moc_sieci_w)) return;
          float chwilowy_bilans_sieci_w = -skorygowana_moc_sieci_w;
          if (id(srednia_moc_okna_w) < chwilowy_bilans_sieci_w) {
            chwilowy_bilans_sieci_w = id(srednia_moc_okna_w);
          }
          if (std::isnan(chwilowy_bilans_sieci_w)) chwilowy_bilans_sieci_w = 0.0f;
          float dostepna_moc_grzalki_w = moc_grzalki_w + chwilowy_bilans_sieci_w - id(docelowy_export_w);
          if (std::isnan(dostepna_moc_grzalki_w)) dostepna_moc_grzalki_w = 0.0f;
          if (dostepna_moc_grzalki_w < 0.0f) dostepna_moc_grzalki_w = 0.0f;
          if (dostepna_moc_grzalki_w > 1500.0f) dostepna_moc_grzalki_w = 1500.0f;

          // Szybkie ciecie nie zuzywa banku godzinowego, bo ma chronić przed realnym importem.
          if (aktualny_prog > 0.0f && dostepna_moc_grzalki_w + 100.0f < moc_grzalki_w) {
            float wolna_moc = dostepna_moc_grzalki_w - 50.0f;
            if (wolna_moc < 0.0f) wolna_moc = 0.0f;

            float nowy_prog = (wolna_moc / 1500.0f) * 100.0f;
            nowy_prog = std::round(nowy_prog / 5.0f) * 5.0f;

            if (std::isnan(nowy_prog)) nowy_prog = 0.0f;
            if (nowy_prog > 0.0f && nowy_prog < 15.0f) nowy_prog = 0.0f;

            if (nowy_prog > 100.0f) nowy_prog = 100.0f;
            if (nowy_prog < 0.0f) nowy_prog = 0.0f;

            if (nowy_prog != aktualny_prog) {
              ESP_LOGE("BEZPIECZNIK", "Szybkie ciecie. Siec=%.0fW skoryg=%.0fW wiek=%us okno=%.0fW grzalka=%.0fW cel_export=%.0fW dostepne=%.0fW. Ustawiam %.0f%%", id(grid_power_wartosc), skorygowana_moc_sieci_w, wiek_grid_ms / 1000, id(srednia_moc_okna_w), moc_grzalki_w, id(docelowy_export_w), dostepna_moc_grzalki_w, nowy_prog);
              id(grzalka_moc_zmiana_wewnetrzna) = true;
              id(grzalka_moc).publish_state(nowy_prog);
              id(grzalka_moc_zmiana_wewnetrzna) = false;
              id(grzalka_pwm).set_level(nowy_prog / 100.0f);
              id(led_pwm).set_level(nowy_prog / 100.0f);
            }
          }

          // Częsty odczyt PV sluzy tylko do szybkiego ciecia mocy.
          // Zwiekszanie mocy zostaje w glownej petli, ktora widzi pelny odczyt licznikow.
      - if:
          condition:
            lambda: |-
              if (!id(tryb_auto).state) return false;
              float aktualny_prog = id(grzalka_moc).state;
              if (std::isnan(aktualny_prog) || aktualny_prog < 0.0f) aktualny_prog = 0.0f;
              if (aktualny_prog > 100.0f) aktualny_prog = 100.0f;
              float moc_grzalki_w = (aktualny_prog / 100.0f) * 1500.0f;
              float skorygowana_moc_sieci_w = id(grid_power_wartosc);
              uint32_t wiek_grid_ms = id(grid_power_ostatni_odczyt_ms) == 0 ? 0 : millis() - id(grid_power_ostatni_odczyt_ms);
              if (id(grid_power_ostatni_odczyt_ms) != 0 && wiek_grid_ms <= 45000) {
                float pv_w = std::isnan(id(pv_power_wartosc)) ? id(pv_power_przy_grid_wartosc) : id(pv_power_wartosc);
                if (std::isnan(pv_w)) pv_w = 0.0f;
                float pv_przy_grid_w = std::isnan(id(pv_power_przy_grid_wartosc)) ? pv_w : id(pv_power_przy_grid_wartosc);
                float grzalka_przy_grid_w = std::isnan(id(grzalka_moc_przy_grid_w)) ? moc_grzalki_w : id(grzalka_moc_przy_grid_w);
                float zmiana_pv_w = pv_w - pv_przy_grid_w;
                float zmiana_grzalki_w = moc_grzalki_w - grzalka_przy_grid_w;
                skorygowana_moc_sieci_w = id(grid_power_wartosc) - zmiana_pv_w + zmiana_grzalki_w;
              }
              if (std::isnan(skorygowana_moc_sieci_w)) return false;
              float chwilowy_bilans_sieci_w = -skorygowana_moc_sieci_w;
              if (!std::isnan(id(srednia_moc_okna_w)) && id(srednia_moc_okna_w) < chwilowy_bilans_sieci_w) {
                chwilowy_bilans_sieci_w = id(srednia_moc_okna_w);
              }
              if (std::isnan(chwilowy_bilans_sieci_w)) return false;
              float dostepna_moc_grzalki_w = moc_grzalki_w + chwilowy_bilans_sieci_w - id(docelowy_export_w);
              if (std::isnan(dostepna_moc_grzalki_w)) return false;
              return dostepna_moc_grzalki_w + 100.0f < moc_grzalki_w;
          then:
            - script.stop: regulacja_auto

  - id: regulacja_auto
    mode: restart
    then:
      - lambda: |-
          float c_import = id(licznik_import_ha).state;
          float c_export = id(licznik_export_ha).state;

          if (std::isnan(c_import) || std::isnan(c_export)) {
            id(licznik_energii_przeterminowany) = true;
            id(srednia_moc_okna_w) = 0.0f;
            id(moc_banku_godzinowego_w) = 0.0f;
            id(bilans_godzinowy_moc_okna).publish_state(0.0f);
            id(bilans_godzinowy_moc_banku).publish_state(0.0f);
            if (std::isnan(id(grzalka_moc).state) || id(grzalka_moc).state > 0.0f) {
              ESP_LOGE("LICZNIK", "Licznik energii jest niedostepny w Home Assistant. Wylaczam moc grzalki.");
              id(grzalka_moc_zmiana_wewnetrzna) = true;
              id(grzalka_moc).publish_state(0.0f);
              id(grzalka_moc_zmiana_wewnetrzna) = false;
              id(grzalka_moc_zaakceptowana_proc) = 0.0f;
              id(grzalka_pwm).set_level(0.0f);
              id(led_pwm).set_level(0.0f);
              id(grzalka_moc_ostatnia_zmiana_ms) = millis();
            } else {
              ESP_LOGD("BILANS_H", "Oczekiwanie na poprawne liczniki energii z Home Assistant...");
            }
            return;
          }

          uint32_t teraz_ms = millis();
          bool brak_danych_licznika = id(licznik_energii_ostatni_odczyt_ms) == 0 ||
              teraz_ms - id(licznik_energii_ostatni_odczyt_ms) > id(maks_wiek_licznika_energii_ms);
          if (brak_danych_licznika) {
            id(licznik_energii_przeterminowany) = true;
            id(srednia_moc_okna_w) = 0.0f;
            id(moc_banku_godzinowego_w) = 0.0f;
            id(bilans_godzinowy_moc_okna).publish_state(0.0f);
            id(bilans_godzinowy_moc_banku).publish_state(0.0f);
            if (std::isnan(id(grzalka_moc).state) || id(grzalka_moc).state > 0.0f) {
              ESP_LOGE("LICZNIK", "Brak swiezych danych licznika energii: ostatni=%us import=%us export=%us limit=%us. Wylaczam moc grzalki do powrotu danych.",
                       id(licznik_energii_ostatni_odczyt_ms) == 0 ? 9999 : (teraz_ms - id(licznik_energii_ostatni_odczyt_ms)) / 1000,
                       id(licznik_import_ostatni_odczyt_ms) == 0 ? 9999 : (teraz_ms - id(licznik_import_ostatni_odczyt_ms)) / 1000,
                       id(licznik_export_ostatni_odczyt_ms) == 0 ? 9999 : (teraz_ms - id(licznik_export_ostatni_odczyt_ms)) / 1000,
                       id(maks_wiek_licznika_energii_ms) / 1000);
              id(grzalka_moc_zmiana_wewnetrzna) = true;
              id(grzalka_moc).publish_state(0.0f);
              id(grzalka_moc_zmiana_wewnetrzna) = false;
              id(grzalka_moc_zaakceptowana_proc) = 0.0f;
              id(grzalka_pwm).set_level(0.0f);
              id(led_pwm).set_level(0.0f);
              id(grzalka_moc_ostatnia_zmiana_ms) = teraz_ms;
            } else {
              ESP_LOGD("LICZNIK", "Czekam na swieze dane licznika energii: ostatni=%us import=%us export=%us limit=%us.",
                       id(licznik_energii_ostatni_odczyt_ms) == 0 ? 9999 : (teraz_ms - id(licznik_energii_ostatni_odczyt_ms)) / 1000,
                       id(licznik_import_ostatni_odczyt_ms) == 0 ? 9999 : (teraz_ms - id(licznik_import_ostatni_odczyt_ms)) / 1000,
                       id(licznik_export_ostatni_odczyt_ms) == 0 ? 9999 : (teraz_ms - id(licznik_export_ostatni_odczyt_ms)) / 1000,
                       id(maks_wiek_licznika_energii_ms) / 1000);
            }
            return;
          }
          id(licznik_energii_przeterminowany) = false;

          auto teraz = id(ha_time).now();
          bool czas_ok = teraz.is_valid();
          int aktualna_godzina = czas_ok ? teraz.hour : -1;

          auto reset_bilansu = [&](const char *powod) {
            id(godzina_bilansu) = aktualna_godzina;
            id(start_import_kwh_godzina) = c_import;
            id(start_export_kwh_godzina) = c_export;
            id(ostatni_import_kwh) = c_import;
            id(ostatni_export_kwh) = c_export;
            id(ostatni_odczyt_ms) = millis();
            id(bilans_godzinowy_wh) = 0.0f;
            id(import_godzina_wh_wartosc) = 0.0f;
            id(export_godzina_wh_wartosc) = 0.0f;
            id(srednia_moc_okna_w) = 0.0f;
            id(moc_banku_godzinowego_w) = 0.0f;
            id(grzalka_auto_start_w_godzinie) = false;
            id(bilans_zainicjowany) = true;
            id(pobor_godziny).publish_state(0.0f);
            id(oddanie_godziny).publish_state(0.0f);
            id(bilans_godzinowy_energia).publish_state(0.0f);
            id(bilans_godzinowy_moc_banku).publish_state(0.0f);
            id(bilans_godzinowy_moc_okna).publish_state(0.0f);
            ESP_LOGW("BILANS_H", "Start/reset bilansu godzinowego: %s | import=%.3fkWh export=%.3fkWh", powod, c_import, c_export);
          };

          if (!id(bilans_zainicjowany)) {
            reset_bilansu("pierwszy odczyt");
            return;
          }

          if (czas_ok && aktualna_godzina != id(godzina_bilansu)) {
            reset_bilansu("nowa godzina");
            return;
          }

          if (c_import < id(start_import_kwh_godzina) || c_export < id(start_export_kwh_godzina) ||
              c_import < id(ostatni_import_kwh) || c_export < id(ostatni_export_kwh)) {
            reset_bilansu("licznik cofniety/zresetowany");
            return;
          }

          float takt_sekundy = (teraz_ms - id(ostatni_odczyt_ms)) / 1000.0f;
          if (takt_sekundy < 5.0f || takt_sekundy > 300.0f) {
            takt_sekundy = 30.0f;
          }

          float delta_import_wh = (c_import - id(ostatni_import_kwh)) * 1000.0f;
          float delta_export_wh = (c_export - id(ostatni_export_kwh)) * 1000.0f;

          id(ostatni_import_kwh) = c_import;
          id(ostatni_export_kwh) = c_export;
          id(ostatni_odczyt_ms) = teraz_ms;

          float srednia_moc_sieci_w = ((delta_import_wh - delta_export_wh) / takt_sekundy) * 3600.0f;
          float realny_bilans_sieci_w = -srednia_moc_sieci_w;
          id(srednia_moc_okna_w) = realny_bilans_sieci_w;

          float import_godzina_wh = (c_import - id(start_import_kwh_godzina)) * 1000.0f;
          float export_godzina_wh = (c_export - id(start_export_kwh_godzina)) * 1000.0f;
          id(import_godzina_wh_wartosc) = import_godzina_wh;
          id(export_godzina_wh_wartosc) = export_godzina_wh;
          id(bilans_godzinowy_wh) = export_godzina_wh - import_godzina_wh;
          id(pobor_godziny).publish_state(import_godzina_wh);
          id(oddanie_godziny).publish_state(export_godzina_wh);

          float pozostalo_s = 1800.0f;
          if (czas_ok) {
            pozostalo_s = (59.0f - teraz.minute) * 60.0f + (60.0f - teraz.second);
            if (pozostalo_s < 30.0f) pozostalo_s = 30.0f;
          }

          float moc_z_banku_w = 0.0f;
          float bilans_do_wykorzystania_wh = id(bilans_godzinowy_wh) - id(rezerwa_exportu_godzinowego_wh);
          if (bilans_do_wykorzystania_wh > 5.0f) {
            moc_z_banku_w = (bilans_do_wykorzystania_wh * 3600.0f) / pozostalo_s;
            if (moc_z_banku_w > 1500.0f) moc_z_banku_w = 1500.0f;
          }
          id(moc_banku_godzinowego_w) = moc_z_banku_w;

          // Licznik bilansu ma dzialac zawsze; ponizej zaczyna sie tylko regulacja AUTO.
          if (!id(tryb_auto).state) {
            ESP_LOGD("BILANS_H", "Licznik aktywny bez regulacji AUTO. Okno30s=%.0fW | bilans_h=%.0fWh | bank=%.0fW", realny_bilans_sieci_w, id(bilans_godzinowy_wh), moc_z_banku_w);
            return;
          }

          float t_max = id(temp_max_ustawienie).state;
          if (!id(temp_cwu_ma_odczyt) || std::isnan(t_max)) {
            ESP_LOGE("TERMOSTAT", "Brak poprawnej temperatury CWU albo nastawy w AUTO. Wylaczam grzalke i tryby pracy.");
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }
          if (id(temp_cwu_wartosc) >= t_max) {
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }

          float aktualny_prog = id(grzalka_moc).state;
          bool aktualny_prog_byl_nan = std::isnan(aktualny_prog);
          if (aktualny_prog_byl_nan || aktualny_prog < 0.0f) aktualny_prog = 0.0f;
          if (aktualny_prog > 100.0f) aktualny_prog = 100.0f;
          if (aktualny_prog_byl_nan) {
            ESP_LOGE("BILANS_H", "Stan mocy grzalki byl NaN. Zeruje suwak i wyjscia.");
            id(grzalka_moc_zmiana_wewnetrzna) = true;
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_moc_zmiana_wewnetrzna) = false;
            id(grzalka_moc_zaakceptowana_proc) = 0.0f;
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            id(grzalka_moc_ostatnia_zmiana_ms) = millis();
          }
          float nowy_prog = aktualny_prog;

          float moc_grzalki_w = (aktualny_prog / 100.0f) * 1500.0f;
          float skorygowana_moc_sieci_w = -realny_bilans_sieci_w;
          uint32_t wiek_grid_ms = id(grid_power_ostatni_odczyt_ms) == 0 ? 0 : millis() - id(grid_power_ostatni_odczyt_ms);
          if (id(grid_power_ostatni_odczyt_ms) != 0 && wiek_grid_ms <= 45000 && realny_bilans_sieci_w > 0.0f) {
            float pv_w = std::isnan(id(pv_power_wartosc)) ? id(pv_power_przy_grid_wartosc) : id(pv_power_wartosc);
            if (std::isnan(pv_w)) pv_w = 0.0f;
            float pv_przy_grid_w = std::isnan(id(pv_power_przy_grid_wartosc)) ? pv_w : id(pv_power_przy_grid_wartosc);
            float grzalka_przy_grid_w = std::isnan(id(grzalka_moc_przy_grid_w)) ? moc_grzalki_w : id(grzalka_moc_przy_grid_w);
            float zmiana_pv_w = pv_w - pv_przy_grid_w;
            float zmiana_grzalki_w = moc_grzalki_w - grzalka_przy_grid_w;
            float skorygowana_z_mocy_w = id(grid_power_wartosc) - zmiana_pv_w + zmiana_grzalki_w;
            float bilans_z_mocy_w = -skorygowana_z_mocy_w;
            if (!std::isnan(bilans_z_mocy_w) && bilans_z_mocy_w < realny_bilans_sieci_w) {
              skorygowana_moc_sieci_w = skorygowana_z_mocy_w;
            }
          }
          if (std::isnan(skorygowana_moc_sieci_w)) skorygowana_moc_sieci_w = 0.0f;
          float chwilowy_bilans_sieci_w = -skorygowana_moc_sieci_w;
          if (std::isnan(chwilowy_bilans_sieci_w)) chwilowy_bilans_sieci_w = 0.0f;
          float dostepna_moc_grzalki_w = moc_grzalki_w + chwilowy_bilans_sieci_w - id(docelowy_export_w);
          if (std::isnan(dostepna_moc_grzalki_w)) dostepna_moc_grzalki_w = 0.0f;
          if (dostepna_moc_grzalki_w < 0.0f) dostepna_moc_grzalki_w = 0.0f;
          if (dostepna_moc_grzalki_w > 1500.0f) dostepna_moc_grzalki_w = 1500.0f;

          if (aktualny_prog == 0.0f && dostepna_moc_grzalki_w < 200.0f) {
            return;
          }

          float wymagany_bufor_przed_startem_wh = id(bufor_startu_grzalki_wh) + id(rezerwa_exportu_godzinowego_wh);
          if (aktualny_prog == 0.0f && !id(grzalka_auto_start_w_godzinie) &&
              id(bilans_godzinowy_wh) < wymagany_bufor_przed_startem_wh) {
            ESP_LOGD("BILANS_H", "Zbieram bufor przed pierwszym startem grzalki: bilans=%.0fWh wymagane=%.0fWh rezerwa=%.0fWh", id(bilans_godzinowy_wh), wymagany_bufor_przed_startem_wh, id(rezerwa_exportu_godzinowego_wh));
            return;
          }

          nowy_prog = (dostepna_moc_grzalki_w / 1500.0f) * 100.0f;

          nowy_prog = std::round(nowy_prog / 5.0f) * 5.0f;
          if (std::isnan(nowy_prog)) nowy_prog = 0.0f;

          // Podbijanie mocy robimy ostroznie, bo liczniki energii odswiezaja sie wolniej
          // niz zmiany PWM grzalki. Ciecie mocy nadal moze byc natychmiastowe.
          bool licznik_po_zmianie_grzalki = id(ostatni_odczyt_ms) != 0 &&
              (id(grzalka_moc_ostatnia_zmiana_ms) == 0 ||
               (int32_t) (id(ostatni_odczyt_ms) - id(grzalka_moc_ostatnia_zmiana_ms)) >= 0);
          uint32_t czas_od_zmiany_ms = id(grzalka_moc_ostatnia_zmiana_ms) == 0 ? 0 : millis() - id(grzalka_moc_ostatnia_zmiana_ms);
          bool grzalka_ustabilizowana = id(grzalka_moc_ostatnia_zmiana_ms) == 0 || czas_od_zmiany_ms >= 60000;
          if (aktualny_prog > 0.0f && nowy_prog > aktualny_prog && (!licznik_po_zmianie_grzalki || !grzalka_ustabilizowana)) {
            ESP_LOGD("BILANS_H", "Czekam ze wzrostem mocy na stabilny odczyt licznikow po zmianie grzalki. cel=%.0f%% aktualnie=%.0f%% od_zmiany=%us licznik_po=%s", nowy_prog, aktualny_prog, czas_od_zmiany_ms / 1000, licznik_po_zmianie_grzalki ? "tak" : "nie");
            nowy_prog = aktualny_prog;
          }

          float maks_wzrost = aktualny_prog == 0.0f ? 35.0f : 25.0f;
          if (nowy_prog > aktualny_prog + maks_wzrost) {
            nowy_prog = aktualny_prog + maks_wzrost;
          }

          if (nowy_prog > 0.0f && nowy_prog < 15.0f) {
            nowy_prog = 0.0f;
            ESP_LOGD("MIN_POWER", "Za mala nadwyzka na prog 200W. Wylaczam.");
          }

          if (nowy_prog > 100.0f) nowy_prog = 100.0f;
          if (nowy_prog < 0.0f) nowy_prog = 0.0f;

          ESP_LOGW("BILANS_H", "Siec=%.0fW | skoryg=%.0fW | wiek=%us | chwilowo=%.0fW | Okno30s=%.0fW | bilans_h=%.0fWh | bank=%.0fW | cel_export=%.0fW | dostepne=%.0fW | cel=%.0f%%", id(grid_power_wartosc), skorygowana_moc_sieci_w, wiek_grid_ms / 1000, chwilowy_bilans_sieci_w, realny_bilans_sieci_w, id(bilans_godzinowy_wh), moc_z_banku_w, id(docelowy_export_w), dostepna_moc_grzalki_w, nowy_prog);

          if (nowy_prog != aktualny_prog) {
            id(grzalka_moc_zmiana_wewnetrzna) = true;
            id(grzalka_moc).publish_state(nowy_prog);
            id(grzalka_moc_zmiana_wewnetrzna) = false;
            id(grzalka_pwm).set_level(nowy_prog / 100.0f);
            id(led_pwm).set_level(nowy_prog / 100.0f);
            if (aktualny_prog == 0.0f && nowy_prog > 0.0f) {
              id(grzalka_auto_start_w_godzinie) = true;
              ESP_LOGW("BILANS_H", "Pierwszy start grzalki w tej godzinie po uzbieraniu bufora %.0fWh. bilans=%.0fWh", wymagany_bufor_przed_startem_wh, id(bilans_godzinowy_wh));
            }
          }
