esphome:
  name: grzaka-bojlera
  friendly_name: Grzałka bojlera
  on_boot:
    priority: -100
    then:
      - output.set_level:
          id: grzalka_pwm
          level: 0.0
      - output.set_level:
          id: led_pwm
          level: 0.0
      - number.set:
          id: grzalka_moc
          value: 0
      - script.execute: publikuj_stany_lokalne

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret grzalka_bojlera_api_key
  reboot_timeout: 0s
  on_client_connected:
    - delay: 2s
    - script.execute: publikuj_stany_lokalne

ota:
  - platform: esphome
    password: !secret grzalka_bojlera_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 0s
  power_save_mode: none
  on_connect:
    - script.execute: publikuj_stany_lokalne
  ap:
    ssid: "Grzaka-Bojlera Fallback Hotspot"
    password: !secret grzalka_bojlera_ap_password

captive_portal:

web_server:
  port: 80
  version: 3

time:
  - platform: homeassistant
    id: ha_time

# Glowna petla bilansowania godzinowego z licznikow (odczyty co 30 sekund)
interval:
  - interval: 30s
    then:
      - script.execute: regulacja_auto
  - interval: 10s
    then:
      - script.execute: aktualizuj_statystyki_grzalki

# -- Wyjscia ---------------------------------------------------------------
output:
  - platform: slow_pwm
    pin: GPIO16
    id: grzalka_pwm
    period: 15s
  - platform: ledc
    pin: GPIO2
    id: led_pwm
    inverted: false

# -- Zmienne globalne ------------------------------------------------------
globals:
  - id: grid_power_wartosc
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: grid_import_power_kw_wartosc
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: grid_export_power_kw_wartosc
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: grid_import_power_ma_odczyt
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: grid_export_power_ma_odczyt
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: pv_power_wartosc
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: grid_power_ostatni_odczyt_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: pv_power_przy_grid_wartosc
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: grzalka_moc_przy_grid_w
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: grzalka_moc_ostatnia_zmiana_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: temp_cwu_wartosc
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: temp_cwu_ma_odczyt
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: histereza_temp_cwu
    type: float
    restore_value: no
    initial_value: '1.0'

  # Bilans godzinowy: dodatni = nadwyzka oddana do sieci w aktualnej godzinie.
  - id: bilans_zainicjowany
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: godzina_bilansu
    type: int
    restore_value: no
    initial_value: '-1'
  - id: start_import_kwh_godzina
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: start_export_kwh_godzina
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: ostatni_import_kwh
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: ostatni_export_kwh
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: ostatni_odczyt_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: licznik_import_ostatni_odczyt_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: licznik_export_ostatni_odczyt_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: licznik_energii_ostatni_odczyt_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: licznik_energii_przeterminowany
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: maks_wiek_licznika_energii_ms
    type: uint32_t
    restore_value: no
    initial_value: '120000'
  - id: bilans_godzinowy_wh
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: import_godzina_wh_wartosc
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: export_godzina_wh_wartosc
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: srednia_moc_okna_w
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: moc_banku_godzinowego_w
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: energia_grzalki_kwh
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: energia_grzalki_nadwyzka_kwh
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: energia_grzalki_import_kwh
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: czas_pracy_grzalki_h
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: ostatni_pomiar_statystyk_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: grzalka_auto_start_w_godzinie
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: bufor_startu_grzalki_wh
    type: float
    restore_value: no
    initial_value: '60.0'
  - id: rezerwa_exportu_godzinowego_wh
    type: float
    restore_value: no
    initial_value: '10.0'
  - id: docelowy_export_w
    type: float
    restore_value: no
    initial_value: '300.0'
  - id: auto_wylaczone_przez_termostat
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: grzalka_moc_zmiana_wewnetrzna
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: grzalka_moc_zaakceptowana_proc
    type: float
    restore_value: no
    initial_value: '0.0'

# -- Suwaki ----------------------------------------------------------------
number:
  - platform: template
    name: "Moc grzałki"
    id: grzalka_moc
    min_value: 0
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    optimistic: true
    mode: slider
    initial_value: 0
    restore_value: false
    on_value:
      - lambda: |-
          if (std::isnan(x)) {
            ESP_LOGE("SUWAK", "Odrzucam niepoprawna wartosc mocy grzalki NaN. Ustawiam 0%%.");
            id(grzalka_moc_zmiana_wewnetrzna) = true;
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_moc_zmiana_wewnetrzna) = false;
            id(grzalka_moc_zaakceptowana_proc) = 0.0f;
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            id(grzalka_moc_ostatnia_zmiana_ms) = millis();
            return;
          }

          if (id(tryb_auto).state && !id(grzalka_moc_zmiana_wewnetrzna)) {
            ESP_LOGW("SUWAK", "Ignoruje reczna zmiane mocy grzalki %.0f%% w trybie AUTO.", x);
            id(grzalka_moc_zmiana_wewnetrzna) = true;
            id(grzalka_moc).publish_state(id(grzalka_moc_zaakceptowana_proc));
            id(grzalka_moc_zmiana_wewnetrzna) = false;
            return;
          }

          float t_max = id(temp_max_ustawienie).state;
          float t_wody = id(temp_cwu_ha).state;
          bool temp_ok = !std::isnan(t_wody);
          if (!temp_ok && id(temp_cwu_ma_odczyt)) {
            t_wody = id(temp_cwu_wartosc);
            temp_ok = !std::isnan(t_wody);
          }

          if (x > 0.0f && (!temp_ok || std::isnan(t_max) || t_wody >= t_max)) {
            if (!temp_ok || std::isnan(t_max)) {
              ESP_LOGE("TERMOSTAT", "Blokuje moc grzalki %.0f%%: brak poprawnej temperatury CWU albo nastawy.", x);
            } else {
              ESP_LOGE("TERMOSTAT", "Blokuje moc grzalki %.0f%%: woda %.1fC >= nastawa %.0fC. Wylaczam tryby pracy.", x, t_wody, t_max);
            }
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            id(grzalka_moc_ostatnia_zmiana_ms) = millis();
            return;
          }

          id(grzalka_moc_ostatnia_zmiana_ms) = millis();
          id(grzalka_moc_zaakceptowana_proc) = x;
          id(grzalka_pwm).set_level(x / 100.0f);
          id(led_pwm).set_level(x / 100.0f);

  - platform: template
    name: "Moc grzałki temperatura max"
    id: temp_max_ustawienie
    min_value: 40
    max_value: 70
    step: 1
    unit_of_measurement: "°C"
    optimistic: true
    mode: slider
    initial_value: 60
    restore_value: true
    on_value:
      - lambda: |-
          float t_wody = id(temp_cwu_ha).state;
          bool temp_ok = !std::isnan(t_wody);
          if (!temp_ok && id(temp_cwu_ma_odczyt)) {
            t_wody = id(temp_cwu_wartosc);
            temp_ok = !std::isnan(t_wody);
          }

          if (!temp_ok) {
            ESP_LOGE("SUWAK", "Brak poprawnego odczytu temperatury CWU po zmianie nastawy na %.0fC. Wylaczam grzalke i tryby pracy.", x);
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }

          id(temp_cwu_wartosc) = t_wody;
          if (t_wody >= x) {
            ESP_LOGE("SUWAK", "Nastawa %.0fC <= woda %.1fC. Wylaczam grzalke i tryby pracy.", x, t_wody);
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else {
            ESP_LOGD("SUWAK", "Nastawa %.0fC > woda %.1fC. Nie zmieniam trybu pracy.", x, t_wody);
          }

  - platform: template
    name: "Histereza temperatury CWU"
    id: temp_histereza_ustawienie
    min_value: 0
    max_value: 5
    step: 0.5
    unit_of_measurement: "°C"
    optimistic: true
    mode: slider
    initial_value: 1.0
    restore_value: true
    on_value:
      - lambda: |-
          id(histereza_temp_cwu) = x;
          float t_max = id(temp_max_ustawienie).state;
          float t_wody = id(temp_cwu_ha).state;
          bool temp_ok = !std::isnan(t_wody);
          if (!temp_ok && id(temp_cwu_ma_odczyt)) {
            t_wody = id(temp_cwu_wartosc);
            temp_ok = !std::isnan(t_wody);
          }

          if (!temp_ok || std::isnan(t_max)) {
            ESP_LOGD("TERMOSTAT", "Zmieniono histereze na %.1fC, ale brak poprawnego odczytu CWU albo nastawy.", x);
            return;
          }

          if (t_wody >= t_max) {
            ESP_LOGE("TERMOSTAT", "Po zmianie histerezy woda %.1fC >= nastawa %.0fC. Wylaczam grzalke i tryby pracy.", t_wody, t_max);
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else if (t_wody <= t_max - id(histereza_temp_cwu) &&
                     !id(tryb_auto).state && !id(tryb_manual).state &&
                     id(auto_wylaczone_przez_termostat)) {
            ESP_LOGW("TERMOSTAT", "Woda %.1fC <= prog powrotu %.1fC po zmianie histerezy. Wlaczam AUTO.", t_wody, t_max - id(histereza_temp_cwu));
            id(tryb_auto).turn_on();
          }

button:
  - platform: template
    name: "Reset statystyk grzałki"
    id: reset_statystyk_grzalki
    icon: "mdi:restart"
    on_press:
      - lambda: |-
          id(energia_grzalki_kwh) = 0.0f;
          id(energia_grzalki_nadwyzka_kwh) = 0.0f;
          id(energia_grzalki_import_kwh) = 0.0f;
          id(czas_pracy_grzalki_h) = 0.0f;
          id(ostatni_pomiar_statystyk_ms) = millis();
          id(zuzycie_grzalki_kwh).publish_state(0.0f);
          id(zuzycie_grzalki_nadwyzka_kwh).publish_state(0.0f);
          id(zuzycie_grzalki_import_kwh).publish_state(0.0f);
          id(sprawnosc_grzalki_proc).publish_state(0.0f);
          id(czas_pracy_grzalki).publish_state(0.0f);
          ESP_LOGW("STAT_GRZALKA", "Zresetowano statystyki grzalki.");

# -- Sensory ---------------------------------------------------------------
sensor:
  - platform: homeassistant
    id: grid_power_ha
    entity_id: sensor.energy_grid_licznik_energii_wm_bus_gateway_moc_poboru_licznik_energii_wm_bus_gateway_moc_oddawana_net_power
    on_value:
      - lambda: |-
          if (std::isnan(x)) {
            ESP_LOGW("GRID", "Ignoruje niepoprawny odczyt net power NaN.");
            return;
          }
          if (id(grid_import_power_ma_odczyt) && id(grid_export_power_ma_odczyt)) {
            return;
          }
          id(grid_power_wartosc) = x;
          id(grid_power_ostatni_odczyt_ms) = millis();
          id(pv_power_przy_grid_wartosc) = std::isnan(id(pv_power_wartosc)) ? 0.0f : id(pv_power_wartosc);
          float moc_proc = id(grzalka_moc).state;
          if (std::isnan(moc_proc)) moc_proc = 0.0f;
          id(grzalka_moc_przy_grid_w) = moc_proc / 100.0f * 1500.0f;

  - platform: homeassistant
    id: grid_import_power_ha
    entity_id: sensor.licznik_energii_wm_bus_gateway_moc_poboru
    on_value:
      - lambda: |-
          id(grid_import_power_kw_wartosc) = x;
          id(grid_import_power_ma_odczyt) = !std::isnan(x);
      - script.execute: aktualizuj_bilans_mocy_sieci

  - platform: homeassistant
    id: grid_export_power_ha
    entity_id: sensor.licznik_energii_wm_bus_gateway_moc_oddawana
    on_value:
      - lambda: |-
          id(grid_export_power_kw_wartosc) = x;
          id(grid_export_power_ma_odczyt) = !std::isnan(x);
      - script.execute: aktualizuj_bilans_mocy_sieci

  - platform: homeassistant
    id: pv_power_ha
    entity_id: sensor.inverter_pv1_power
    on_value:
      - lambda: |-
          if (std::isnan(x)) {
            ESP_LOGW("PV", "Ignoruje niepoprawny odczyt PV NaN.");
            return;
          }
          id(pv_power_wartosc) = x;
      - script.execute: szybka_reakcja_pv

  - platform: homeassistant
    id: licznik_import_ha
    entity_id: sensor.licznik_energii_wm_bus_gateway_energia_pobrana
    on_value:
      - lambda: |-
          if (!std::isnan(x)) {
            id(licznik_import_ostatni_odczyt_ms) = millis();
            id(licznik_energii_ostatni_odczyt_ms) = millis();
          }

  - platform: homeassistant
    id: licznik_export_ha
    entity_id: sensor.licznik_energii_wm_bus_gateway_energia_oddana
    on_value:
      - lambda: |-
          if (!std::isnan(x)) {
            id(licznik_export_ostatni_odczyt_ms) = millis();
            id(licznik_energii_ostatni_odczyt_ms) = millis();
          }

  - platform: homeassistant
    id: temp_cwu_ha
    entity_id: sensor.defro_pelet_temperatura_c_w_u_temperatura
    on_value:
      - lambda: |-
          if (std::isnan(x)) {
            id(temp_cwu_ma_odczyt) = false;
            ESP_LOGE("TERMOSTAT", "Odczyt temperatury CWU jest niepoprawny. Wylaczam grzalke i tryby pracy!");
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
            return;
          }

          id(temp_cwu_wartosc) = x;
          id(temp_cwu_ma_odczyt) = true;
          float t_max = id(temp_max_ustawienie).state;
          if (!std::isnan(x) && !std::isnan(t_max) && x >= t_max &&
              (id(tryb_auto).state || id(tryb_manual).state || id(grzalka_moc).state > 0.0f)) {
            ESP_LOGE("TERMOSTAT", "Bojler osiagnal zadana temperature (%.1fC >= %.0fC). Wylaczam grzalke i tryby pracy!", x, t_max);
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else if (!std::isnan(t_max) && x <= t_max - id(histereza_temp_cwu) && !id(tryb_auto).state &&
                     !id(tryb_manual).state && id(auto_wylaczone_przez_termostat)) {
            ESP_LOGW("TERMOSTAT", "Temperatura CWU %.1fC spadla do progu powrotu %.1fC po odcieciu termostatem. Wlaczam AUTO.", x, t_max - id(histereza_temp_cwu));
            id(tryb_auto).turn_on();
          }

  - platform: homeassistant
    id: temp_cwu_ha_alt_defro
    entity_id: sensor.defro_pelet_temperatura_c_w_u
    on_value:
      - lambda: |-
          if (std::isnan(x)) return;

          id(temp_cwu_wartosc) = x;
          id(temp_cwu_ma_odczyt) = true;
          ESP_LOGD("TERMOSTAT", "Odczyt temperatury CWU z alternatywnej encji Defro: %.1fC", x);

          float t_max = id(temp_max_ustawienie).state;
          if (!std::isnan(t_max) && x >= t_max &&
              (id(tryb_auto).state || id(tryb_manual).state || id(grzalka_moc).state > 0.0f)) {
            ESP_LOGE("TERMOSTAT", "Bojler osiagnal zadana temperature (%.1fC >= %.0fC). Wylaczam grzalke i tryby pracy!", x, t_max);
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else if (!std::isnan(t_max) && x <= t_max - id(histereza_temp_cwu) && !id(tryb_auto).state &&
                     !id(tryb_manual).state && id(auto_wylaczone_przez_termostat)) {
            ESP_LOGW("TERMOSTAT", "Temperatura CWU %.1fC spadla do progu powrotu %.1fC po odcieciu termostatem. Wlaczam AUTO.", x, t_max - id(histereza_temp_cwu));
            id(tryb_auto).turn_on();
          }

  - platform: homeassistant
    id: temp_cwu_ha_alt_short
    entity_id: sensor.temperatura_c_w_u
    on_value:
      - lambda: |-
          if (std::isnan(x)) return;

          id(temp_cwu_wartosc) = x;
          id(temp_cwu_ma_odczyt) = true;
          ESP_LOGD("TERMOSTAT", "Odczyt temperatury CWU z encji sensor.temperatura_c_w_u: %.1fC", x);

          float t_max = id(temp_max_ustawienie).state;
          if (!std::isnan(t_max) && x >= t_max &&
              (id(tryb_auto).state || id(tryb_manual).state || id(grzalka_moc).state > 0.0f)) {
            ESP_LOGE("TERMOSTAT", "Bojler osiagnal zadana temperature (%.1fC >= %.0fC). Wylaczam grzalke i tryby pracy!", x, t_max);
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else if (!std::isnan(t_max) && x <= t_max - id(histereza_temp_cwu) && !id(tryb_auto).state &&
                     !id(tryb_manual).state && id(auto_wylaczone_przez_termostat)) {
            ESP_LOGW("TERMOSTAT", "Temperatura CWU %.1fC spadla do progu powrotu %.1fC po odcieciu termostatem. Wlaczam AUTO.", x, t_max - id(histereza_temp_cwu));
            id(tryb_auto).turn_on();
          }

  - platform: homeassistant
    id: temp_cwu_ha_alt_compact
    entity_id: sensor.temperatura_cwu
    on_value:
      - lambda: |-
          if (std::isnan(x)) return;

          id(temp_cwu_wartosc) = x;
          id(temp_cwu_ma_odczyt) = true;
          ESP_LOGD("TERMOSTAT", "Odczyt temperatury CWU z encji sensor.temperatura_cwu: %.1fC", x);

          float t_max = id(temp_max_ustawienie).state;
          if (!std::isnan(t_max) && x >= t_max &&
              (id(tryb_auto).state || id(tryb_manual).state || id(grzalka_moc).state > 0.0f)) {
            ESP_LOGE("TERMOSTAT", "Bojler osiagnal zadana temperature (%.1fC >= %.0fC). Wylaczam grzalke i tryby pracy!", x, t_max);
            id(auto_wylaczone_przez_termostat) = true;
            id(tryb_auto).turn_off();
            id(tryb_manual).turn_off();
            id(grzalka_moc).publish_state(0.0f);
            id(grzalka_pwm).set_level(0.0f);
            id(led_pwm).set_level(0.0f);
          } else if (!std::isnan(t_max) && x <= t_max - id(histereza_temp_cwu) && !id(tryb_auto).state &&
                     !id(tryb_manual).state && id(auto_wylaczone_przez_termostat)) {
            ESP_LOGW("TERMOSTAT", "Temperatura CWU %.1fC spadla do progu powrotu %.1fC po odcieciu termostatem. Wlaczam AUTO.", x, t_max - id(histereza_temp_cwu));
            id(tryb_auto).turn_on();
          }

  - platform: template
    name: "Moc sieci Waty"
